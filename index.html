<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contour Identity</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1rem;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 300;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 2rem;
      color: #ffffff;
    }
    form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      width: 100%;
      max-width: 360px;
      margin-bottom: 2rem;
    }
    label {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      font-size: 0.85rem;
      color: #999;
    }
    input, select {
      padding: 0.6rem 0.8rem;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 4px;
      color: #e0e0e0;
      font-size: 1rem;
    }
    input:focus, select:focus {
      outline: none;
      border-color: #555;
    }
    button {
      padding: 0.7rem;
      background: #ffffff;
      color: #0a0a0a;
      border: none;
      border-radius: 4px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    #preview-container {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      width: 100%;
      max-width: 960px;
    }
    #preview-container.visible { display: flex; }
    #preview {
      width: 100%;
      height: auto;
      border: 1px solid #222;
    }
    #download-btn {
      background: transparent;
      color: #ffffff;
      border: 1px solid #444;
      font-weight: 400;
    }
  </style>
</head>
<body>
  <h1>Contour Identity</h1>
  <form id="form">
    <label>
      Nome completo
      <input type="text" id="name" required minlength="2" autocomplete="name">
    </label>
    <label>
      Data de nascimento
      <input type="date" id="birthdate" required>
    </label>
    <label>
      Hora de nascimento
      <input type="time" id="birthtime" required>
    </label>
    <label>
      Resolucao
      <select id="resolution">
        <option value="1920x1080">1920 x 1080 (Full HD)</option>
        <option value="2560x1440">2560 x 1440 (2K)</option>
        <option value="3840x2160">3840 x 2160 (4K)</option>
        <option value="1080x1920">1080 x 1920 (Mobile)</option>
      </select>
    </label>
    <button type="submit" id="generate-btn">Gerar</button>
  </form>
  <div id="preview-container">
    <canvas id="preview"></canvas>
    <button id="download-btn">Baixar PNG</button>
  </div>
  <script type="module" src="app.js"></script>
</body>
</html>
